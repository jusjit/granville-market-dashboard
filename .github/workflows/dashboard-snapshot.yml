name: Dashboard Snapshots
on:
  schedule:
    - cron: '25 13 * * 1-5'  # 9:25am EDT premarket (13:25 UTC)
    - cron: '5 21 * * 1-5'   # 5:05pm EDT close (21:05 UTC)
  workflow_dispatch:  # allows manual trigger for testing

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Determine snapshot type and call endpoint
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 17 ]; then
            TYPE="premarket"
          else
            TYPE="close"
          fi
          echo "Snapshot type: $TYPE"
          curl -f -X GET "https://private-market-dashboard.vercel.app/api/snapshot?type=$TYPE" \
            -H "Authorization: Bearer ${{ secrets.SNAPSHOT_SECRET }}"
