name: Fetch FRED Data

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9am ET weekdays (FRED updates by then)
  workflow_dispatch:          # allow manual trigger

jobs:
  fetch-fred:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FRED series
        env:
          FRED_KEY: ${{ secrets.VITE_FRED_KEY }}
        run: |
          BASE="https://api.stlouisfed.org/fred/series/observations"
          PARAMS="api_key=${FRED_KEY}&sort_order=desc&limit=2&file_type=json"

          fetch_series() {
            curl -sf "${BASE}?series_id=$1&${PARAMS}"
          }

          BAML=$(fetch_series "BAMLH0A0HYM2")
          DFII10=$(fetch_series "DFII10")
          T5YIFR=$(fetch_series "T5YIFR")
          DGS10=$(fetch_series "DGS10")

          # Write combined cache file
          cat > public/fred-cache.json << EOF
          {
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "BAMLH0A0HYM2": $BAML,
            "DFII10": $DFII10,
            "T5YIFR": $T5YIFR,
            "DGS10": $DGS10
          }
          EOF

      - name: Commit cache if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/fred-cache.json
          git diff --cached --quiet || git commit -m "chore: update FRED cache [skip ci]"
          git push
